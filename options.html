<!DOCTYPE html>
<html>
<head>
  <title>Jag Settings</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      padding: 2rem;
      max-width: 720px;
      margin: 0 auto;
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      color: #c8b6ff;
      margin-bottom: 0.5rem;
    }
    h2 {
      font-size: 1.1rem;
      font-weight: 600;
      color: #e0e0e0;
      margin: 2rem 0 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid #2a2a4a;
    }
    .subtitle {
      font-size: 0.85rem;
      color: #6a6a8a;
      margin-bottom: 2rem;
    }

    /* Site groups */
    .site-group {
      margin-bottom: 1.5rem;
    }
    .group-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.6rem 0;
      cursor: pointer;
      user-select: none;
    }
    .group-name {
      font-size: 0.9rem;
      font-weight: 600;
      color: #c8b6ff;
    }
    .group-count {
      font-size: 0.75rem;
      color: #6a6a8a;
    }
    .group-toggle-all {
      font-size: 0.75rem;
      color: #6a6a8a;
      cursor: pointer;
      padding: 0.25rem 0.5rem;
      border: 1px solid #3a3a5a;
      border-radius: 4px;
      background: transparent;
      font-family: inherit;
    }
    .group-toggle-all:hover {
      color: #c8b6ff;
      border-color: #c8b6ff;
    }
    .site-list {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      padding: 0.5rem 0;
    }
    .site-chip {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.35rem 0.7rem;
      border-radius: 16px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.15s;
      user-select: none;
      border: 1px solid transparent;
    }
    .site-chip.enabled {
      background: #2a2a4a;
      color: #c8b6ff;
      border-color: #3a3a5a;
    }
    .site-chip.disabled {
      background: transparent;
      color: #4a4a6a;
      border-color: #2a2a3e;
    }
    .site-chip:hover {
      border-color: #c8b6ff;
    }
    .site-chip .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
    }
    .site-chip.enabled .dot { background: #c8b6ff; }
    .site-chip.disabled .dot { background: #3a3a5a; }
    .site-chip .category-tag {
      font-size: 0.65rem;
      color: #5a5a7a;
      margin-left: 0.2rem;
    }

    /* Add custom site */
    .add-site-row {
      display: flex;
      gap: 0.5rem;
      margin-top: 0.5rem;
    }
    .add-site-row input {
      flex: 1;
      padding: 0.5rem 0.75rem;
      border: 1px solid #3a3a5a;
      border-radius: 6px;
      background: #22223a;
      color: #e8e8f0;
      font-size: 0.85rem;
      font-family: inherit;
      outline: none;
    }
    .add-site-row input:focus { border-color: #c8b6ff; }
    .add-site-row input::placeholder { color: #5a5a7a; }
    .add-site-row select {
      padding: 0.5rem;
      border: 1px solid #3a3a5a;
      border-radius: 6px;
      background: #22223a;
      color: #e8e8f0;
      font-size: 0.85rem;
      font-family: inherit;
    }
    .add-site-row button {
      padding: 0.5rem 1rem;
      border: none;
      border-radius: 6px;
      background: #c8b6ff;
      color: #1a1a2e;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
    }

    /* Config sections */
    .config-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-bottom: 1rem;
    }
    .config-field label {
      display: block;
      font-size: 0.8rem;
      color: #8a8aaa;
      margin-bottom: 0.3rem;
    }
    .config-field input {
      width: 100%;
      padding: 0.5rem 0.75rem;
      border: 1px solid #3a3a5a;
      border-radius: 6px;
      background: #22223a;
      color: #e8e8f0;
      font-size: 0.85rem;
      font-family: inherit;
      outline: none;
    }
    .config-field input:focus { border-color: #c8b6ff; }

    /* Save */
    .save-row {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-top: 2rem;
      padding-top: 1rem;
      border-top: 1px solid #2a2a4a;
    }
    #save-btn {
      padding: 0.7rem 2rem;
      border: none;
      border-radius: 8px;
      background: #c8b6ff;
      color: #1a1a2e;
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      font-family: inherit;
    }
    #save-status {
      font-size: 0.85rem;
      color: #6a6a8a;
    }
  </style>
</head>
<body>
  <h1>jag</h1>
  <p class="subtitle">Protect your attention. Configure which sites require justification.</p>

  <h2>Flagged Sites</h2>
  <div id="site-groups"></div>

  <div class="add-site-row">
    <input type="text" id="new-site" placeholder="Add a site (e.g., example.com)" />
    <select id="new-category">
      <option value="never_work">Never work</option>
      <option value="sometimes_work">Sometimes work</option>
    </select>
    <button id="add-site-btn">Add</button>
  </div>

  <h2>Schedule</h2>
  <div class="config-grid">
    <div class="config-field">
      <label>Work hours start</label>
      <input type="time" id="work-start" />
    </div>
    <div class="config-field">
      <label>Work hours end</label>
      <input type="time" id="work-end" />
    </div>
    <div class="config-field">
      <label>Daily target (minutes)</label>
      <input type="number" id="daily-target" min="0" max="480" />
    </div>
    <div class="config-field">
      <label>Rolling window (minutes)</label>
      <input type="number" id="rolling-window" min="30" max="480" />
    </div>
  </div>

  <h2>API Connection</h2>
  <div class="config-grid">
    <div class="config-field" style="grid-column: 1 / -1">
      <label>OpenClaw endpoint</label>
      <input type="text" id="api-endpoint" />
    </div>
    <div class="config-field" style="grid-column: 1 / -1">
      <label>Bearer token</label>
      <input type="password" id="api-token" />
    </div>
  </div>

  <div class="save-row">
    <button id="save-btn">Save</button>
    <span id="save-status"></span>
  </div>

  <script src="options.js"></script>
</body>
</html>
